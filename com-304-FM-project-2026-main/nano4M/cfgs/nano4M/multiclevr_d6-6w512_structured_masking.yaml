# Designed to be run on 2xL40-4*GB GPUs

run_name: auto # Auto-generate a run name
output_dir: ./outputs/auto # Set to auto to use the run_name

# Global variables used throughout the config
global_vars:
  batch_size: 256 # per GPU (512 global batch size)
  modalities: ["tok_rgb@256", "tok_depth@256", "tok_normal@256", "scene_desc"] # Input and output modalities
  vocab_sizes: [64000, 64000, 64000, 50304] # Vocab sizes for each modality
  max_seq_lens: [256, 256, 256, 256] # Max sequence lengths for each modality
  input_alphas: [1.0, 1.0, 1.0, 1.0] # Input dirichlet alpha values for each modality
  target_alphas: [1.0, 1.0, 1.0, 1.0] # Target dirichlet alpha values for each modality
  input_tokens_range: [1, 128] # Min and max encoder tokens during training
  target_tokens_range: [1, 128] # Min and max decoder tokens during training
  masking_strategy: structured # Block masking for image modalities, span masking for scene_desc.
  structured_mask_probability: 1.0
  image_modalities: ["tok_rgb@256", "tok_depth@256", "tok_normal@256"]
  sequence_modalities: ["scene_desc"]
  image_token_grid_sizes:
    tok_rgb@256: [16, 16]
    tok_depth@256: [16, 16]
    tok_normal@256: [16, 16]
  span_geometric_p: 0.2 # Mean span length around 5 tokens.
  block_min_size: 1
  block_max_fraction: 0.5
  use_sentinel_tokens: true  # Remplace le token avant chaque span par un sentinel ID
  num_sentinel_tokens: 20    # Nombre de sentinel tokens distincts

# Training
batch_size: ${global_vars.batch_size}
total_tokens: 5000 # in millions of tokens
warmup_tokens: 500 # in millions of tokens
num_tokens_per_sample: 256
lr: 0.0006
min_lr: 0.000001
weight_decay: 0.05
clip_grad: 1.0
dtype: bf16

# Eval
eval_freq: 100
save_ckpt_freq: 1000

# Logging
log_wandb: True
wandb_project: COM304_nano4M
wandb_entity: zyad-epfl  # Change selon ton username wandb
wandb_run_name: auto

# Model config
model_config:
  _target_: nanofm.models.fourm.FourM
  enc_tokens_read_key: enc_tokens
  dec_tokens_read_key: dec_tokens
  enc_modalities_read_key: enc_modalities
  dec_modalities_read_key: dec_modalities
  enc_positions_read_key: enc_positions
  dec_positions_read_key: dec_positions
  enc_pad_mask_read_key: enc_pad_mask
  dec_pad_mask_read_key: dec_pad_mask
  modalities: ${global_vars.modalities}
  vocab_sizes: ${global_vars.vocab_sizes}
  max_seq_lens: ${global_vars.max_seq_lens}
  dim: 512
  enc_depth: 6
  dec_depth: 6
  head_dim: 64
  per_modality_loss_avg: True

# Train loader config
train_loader_config:
  _target_: nanofm.data.multimodal.create_multimodal_masked_dataloader
  root_dir: /work/com-304/datasets/clevr_com_304/
  split: train
  modalities: ${global_vars.modalities}
  vocab_sizes: ${global_vars.vocab_sizes}
  max_seq_lens: ${global_vars.max_seq_lens}
  overlap_vocab: True
  overlap_posembs: True
  masking_strategy: ${global_vars.masking_strategy}
  structured_mask_probability: ${global_vars.structured_mask_probability}
  image_modalities: ${global_vars.image_modalities}
  sequence_modalities: ${global_vars.sequence_modalities}
  image_token_grid_sizes: ${global_vars.image_token_grid_sizes}
  span_geometric_p: ${global_vars.span_geometric_p}
  block_min_size: ${global_vars.block_min_size}
  block_max_fraction: ${global_vars.block_max_fraction}
  use_sentinel_tokens: ${global_vars.use_sentinel_tokens}
  num_sentinel_tokens: ${global_vars.num_sentinel_tokens}
  input_alphas: ${global_vars.input_alphas}
  target_alphas: ${global_vars.target_alphas}
  input_tokens_range: ${global_vars.input_tokens_range}
  target_tokens_range: ${global_vars.target_tokens_range}
  sample_from_k_augmentations: 10
  text_tokenizer_path: gpt2
  text_max_length: 256
  batch_size: ${global_vars.batch_size}
  infinite: True
  num_workers: 10
  pin_memory: True
  shuffle: True
  drop_last: True
  distributed: True

# Eval loader config
eval_loader_config:
  _target_: nanofm.data.multimodal.create_multimodal_masked_dataloader
  root_dir: /work/com-304/datasets/clevr_com_304/
  split: val
  modalities: ${global_vars.modalities}
  vocab_sizes: ${global_vars.vocab_sizes}
  max_seq_lens: ${global_vars.max_seq_lens}
  overlap_vocab: True
  overlap_posembs: True
  masking_strategy: ${global_vars.masking_strategy}
  structured_mask_probability: ${global_vars.structured_mask_probability}
  image_modalities: ${global_vars.image_modalities}
  sequence_modalities: ${global_vars.sequence_modalities}
  image_token_grid_sizes: ${global_vars.image_token_grid_sizes}
  span_geometric_p: ${global_vars.span_geometric_p}
  block_min_size: ${global_vars.block_min_size}
  block_max_fraction: ${global_vars.block_max_fraction}
  use_sentinel_tokens: ${global_vars.use_sentinel_tokens}
  num_sentinel_tokens: ${global_vars.num_sentinel_tokens}
  input_alphas: ${global_vars.input_alphas}
  target_alphas: ${global_vars.target_alphas}
  input_tokens_range: ${global_vars.input_tokens_range}
  target_tokens_range: ${global_vars.target_tokens_range}
  text_tokenizer_path: gpt2
  text_max_length: 256
  batch_size: ${global_vars.batch_size}
  num_workers: 10
  pin_memory: True
  shuffle: False
  drop_last: False
  distributed: True